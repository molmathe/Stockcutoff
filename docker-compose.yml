services:
  postgres:
    image: postgres:16-alpine
    container_name: stockcutoff-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: stockcutoff
      POSTGRES_USER: stockcutoff
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockcutoff"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stockcutoff-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://stockcutoff:${DB_PASSWORD}@postgres:5432/stockcutoff
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3001
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stockcutoff-frontend
    restart: unless-stopped
    networks:
      - app_net
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  nginx:
    image: nginx:alpine
    container_name: stockcutoff-nginx
    restart: unless-stopped
    ports:
      - "${PORT:-8082}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - app_net
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

networks:
  app_net:
    driver: bridge

volumes:
  postgres_data:
  uploads:
