services:
  postgres:
    image: postgres:16-alpine
    container_name: stockcutoff-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: stockcutoff
      POSTGRES_USER: stockcutoff
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockcutoff"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    image: ghcr.io/molmathe/stockcutoff-backend:${IMAGE_TAG:?IMAGE_TAG is required}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stockcutoff-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://stockcutoff:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/stockcutoff
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      PORT: 3001
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: ghcr.io/molmathe/stockcutoff-frontend:${IMAGE_TAG:?IMAGE_TAG is required}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stockcutoff-frontend
    restart: unless-stopped
    networks:
      - app_net
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  nginx:
    image: nginx:alpine
    container_name: stockcutoff-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PORT:-8082}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - app_net
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: stockcutoff-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:?TUNNEL_TOKEN is required}
    depends_on:
      nginx:
        condition: service_started
    networks:
      - app_net
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  portainer:
    image: portainer/portainer-ce:lts
    container_name: stockcutoff-portainer
    restart: unless-stopped
    command: -H unix:///var/run/docker.sock
    ports:
      - "127.0.0.1:${PORTAINER_PORT:-9000}:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - app_net
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  uptime_kuma:
    image: louislam/uptime-kuma:1
    container_name: stockcutoff-uptime-kuma
    restart: unless-stopped
    ports:
      - "127.0.0.1:${UPTIME_KUMA_PORT:-3002}:3001"
    volumes:
      - uptime_kuma_data:/app/data
    networks:
      - app_net
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  app_net:
    driver: bridge

volumes:
  postgres_data:
  uploads:
  portainer_data:
  uptime_kuma_data:
